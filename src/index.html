<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Spencers Recipe Website</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Roboto, "Helvetica Neue", sans-serif;
      background: #fff7e6;
      color: rgba(20, 20, 20, 0.87);
    }
    app-root { display: block; min-height: 100vh; }
  </style>
  <script>
    (function loadNonCriticalStyles() {
      var href = new URL('non-critical/quill.snow.css', document.baseURI).toString();
      var inject = function () {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        document.head.appendChild(link);
      };

      if ('requestIdleCallback' in window) {
        window.requestIdleCallback(inject, { timeout: 1200 });
      } else {
        window.setTimeout(inject, 0);
      }
    })();
  </script>
  <link rel="preload" href="fonts/roboto-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/roboto-latin-500-normal.woff2" as="font" type="font/woff2" crossorigin>
  <script src="env.js"></script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
